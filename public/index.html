<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema di gestione prenotazioni sale riunioni WorkSphere Solutions">

  <title>WorkSphere - Gestione Prenotazioni</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link visually-hidden-focusable">
    Salta al contenuto principale
  </a>

  <header class="text-white py-3 shadow-sm" style="background-color: #2563EB;">
    <div class="container">
      <div class="d-flex align-items-center">
        <i class="bi bi-building fs-2 me-3" aria-hidden="true"></i>
        <div>
          <h1 class="h3 mb-0">WorkSphere Solutions</h1>
          <p class="mb-0 small opacity-75">Sistema di Gestione Prenotazioni</p>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" class="container my-4">
    <div id="alert-container" role="alert" aria-live="polite" aria-atomic="true"></div>

    <div class="griglia-controls mb-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="d-flex align-items-center gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="giornoPrev" aria-label="Giorno precedente">
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
          </button>
          <span id="giornoTitolo" class="fw-bold fs-5">Oggi</span>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="giornoNext" aria-label="Giorno successivo">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="giornoOggi">Oggi</button>
        </div>
        <div class="griglia-legend" role="list" aria-label="Legenda stati prenotazione">
          <div class="legend-item" role="listitem">
            <span class="legend-color available" aria-hidden="true"></span>
            <span>Libero</span>
          </div>
          <div class="legend-item" role="listitem">
            <span class="legend-color occupied" aria-hidden="true"></span>
            <span>Occupato</span>
          </div>
        </div>
      </div>
    </div>

    <div class="table-responsive d-none d-md-block">
      <table class="table griglia-tabella" id="grigliaPrenotazioni" role="grid" aria-label="Griglia prenotazioni sale">
        <thead>
          <tr id="griglia-header">
            <th class="ora-colonna" scope="col"><span class="visually-hidden">Orario</span></th>
          </tr>
        </thead>
        <tbody id="griglia-body">
          <tr>
            <td colspan="20" class="text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Caricamento...</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="griglia-mobile" class="d-md-none" aria-live="polite"></div>
  </main>

  <div class="modal fade" id="dettagliSalaModal" tabindex="-1" aria-labelledby="dettagliSalaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-info text-white">
          <h5 class="modal-title" id="dettagliSalaModalLabel">
            <i class="bi bi-door-closed" aria-hidden="true"></i>
            Dettagli Sala
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <h4 id="sala-dettagli-nome"></h4>
          <p class="mb-1"><strong>Capacità:</strong> <span id="sala-dettagli-capacita"></span> persone</p>
          <p class="mb-0"><strong>Descrizione:</strong> <span id="sala-dettagli-descrizione"></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="prenotazioneModal" tabindex="-1" aria-labelledby="prenotazioneModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="prenotazioneModalLabel">
            <i class="bi bi-calendar-plus" aria-hidden="true"></i>
            Nuova Prenotazione
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <form id="prenotazione-form" novalidate>
            <input type="hidden" id="sala-id" value="">
            <input type="hidden" id="data-selezionata" value="">

            <div class="alert alert-info mb-3">
              <div class="row text-center">
                <div class="col-4">
                  <i class="bi bi-building d-block fs-4"></i>
                  <small id="prenotazione-sala" class="fw-bold"></small>
                </div>
                <div class="col-4">
                  <i class="bi bi-calendar d-block fs-4"></i>
                  <small id="prenotazione-data" class="fw-bold"></small>
                </div>
                <div class="col-4">
                  <i class="bi bi-clock d-block fs-4"></i>
                  <small id="prenotazione-orario" class="fw-bold"></small>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="prenotazione-nome" class="form-label">
                Nome Prenotazione / Team <span class="text-danger">*</span>
              </label>
              <input type="text" id="prenotazione-nome" class="form-control" required 
                     minlength="2" maxlength="100" placeholder="Es: Riunione marketing, Team UX...">
              <div class="invalid-feedback">Inserisci un nome valido</div>
            </div>

            <div class="mb-3">
              <label for="prenotazione-note" class="form-label">Note (opzionali)</label>
              <textarea id="prenotazione-note" class="form-control" rows="2" 
                        placeholder="Eventuali note aggiuntive..."></textarea>
            </div>

            <div class="d-flex gap-2">
              <div class="flex-grow-1">
                <label for="ora-inizio" class="form-label">Ora inizio</label>
                <select id="ora-inizio" class="form-select" required></select>
              </div>
              <div class="flex-grow-1">
                <label for="ora-fine" class="form-label">Ora fine</label>
                <select id="ora-fine" class="form-select" required></select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-primary" id="btnConfermaPrenotazione">
            <i class="bi bi-check-circle" aria-hidden="true"></i> Conferma Prenotazione
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="risultatoModal" tabindex="-1" aria-labelledby="risultatoModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <div id="risultato-icon" class="mb-3"></div>
          <h5 id="risultato-titolo" class="mb-2"></h5>
          <p id="risultato-messaggio" class="text-muted mb-0"></p>
        </div>
        <div class="modal-footer justify-content-center">
          <button type="button" class="btn btn-primary" id="btnChiudiRisultato" data-bs-dismiss="modal">
            Chiudi
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="py-4 mt-5" style="background-color: #F1F5F9;">
    <div class="container text-center">
      <p class="mb-0" style="color: #475569;">
        &copy; 2025 WorkSphere Solutions. Sistema di gestione prenotazioni.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
          crossorigin="anonymous"></script>

  <script type="module" src="dist/app.js"></script>
</body>
</html>
